version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finitech-postgres
    environment:
      POSTGRES_USER: finitech
      POSTGRES_PASSWORD: YourStrong@Passw0rd
      POSTGRES_DB: finitech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finitech-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finitech -d finitech"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: finitech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finitech-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: finitech-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: finitech
      RABBITMQ_DEFAULT_PASS: finitech
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - finitech-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/ApiHost/Finitech.ApiHost/Dockerfile
    container_name: finitech-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=finitech;Username=finitech;Password=YourStrong@Passw0rd
      - ConnectionStrings__LedgerDatabase=Host=postgres;Port=5432;Database=finitech;Username=finitech;Password=YourStrong@Passw0rd
      - RabbitMQ__Host=rabbitmq
      - Redis__ConnectionString=redis:6379
      - Jwt__Issuer=Finitech
      - Jwt__Audience=FinitechApi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - finitech-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  finitech-network:
    driver: bridge
