apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
bases:
  - ../../base
patchesStrategicMerge:
  - deployment-patch.yaml
  - ingress-patch.yaml
secretGenerator:
  - name: finitech-secrets
    literals:
      - connection-string=Host=prod-postgres;Port=5432;Database=finitech;Username=finitech;Password=prod-password;SSL Mode=Require
      - rabbitmq-host=prod-rabbitmq
      - redis-connection=prod-redis:6379
