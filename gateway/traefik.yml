# Traefik API Gateway Configuration for Finitech
# Run with: docker-compose -f docker-compose.yml -f gateway/docker-compose.gateway.yml up

api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml

log:
  level: INFO
