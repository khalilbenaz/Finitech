version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: finitech-gateway
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - finitech-network
    labels:
      - "traefik.enable=true"

networks:
  finitech-network:
    external: true
    name: finitech_finitech-network
