name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finitech
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: finitech_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finitech -d finitech_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Finitech.sln

      - name: Build
        run: dotnet build Finitech.sln --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test tests/Finitech.UnitTests --configuration Release --no-build --verbosity normal

      - name: Architecture Tests
        run: dotnet test tests/Finitech.ArchitectureTests --configuration Release --no-build --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/Finitech.IntegrationTests --configuration Release --no-build --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=finitech_test;Username=finitech;Password=testpassword"

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t finitech:latest -f src/ApiHost/Finitech.ApiHost/Dockerfile .
