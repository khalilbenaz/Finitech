name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Finitech.sln

      - name: Build
        run: dotnet build Finitech.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test tests/Finitech.UnitTests --configuration Release --no-build --verbosity normal

      - name: Run Architecture Tests
        run: dotnet test tests/Finitech.ArchitectureTests --configuration Release --no-build --verbosity normal
